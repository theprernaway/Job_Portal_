spring.application.name=job-portal

# ── PostgreSQL ────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/jobportaldb
spring.datasource.username=postgres
spring.datasource.password=yourpassword
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=jobPortalSuperSecretKeyForJwtTokenGenerationMinimum256Bits!
jwt.expiration.ms=86400000

# ── Redis ─────────────────────────────────────────────────────────────────────
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ── Kafka ─────────────────────────────────────────────────────────────────────
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.group-id=job-portal-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.auto-offset-reset=earliest

kafka.topic.job-applied=job.applied
kafka.topic.job-status-changed=job.status.changed
kafka.topic.application-status-changed=application.status.changed

server.port=8080
